<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Academic Forecaster v0.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            color: #334155;
            overflow-x: hidden;
        }
        
        /* Glassmorphism Container */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        /* Screen Transitions */
        .app-screen { display: none; opacity: 0; transform: scale(0.98); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .app-screen.active-screen { display: block; opacity: 1; transform: scale(1); }

        .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-content.active { display: block; opacity: 1; transform: translateY(0); }
        .hidden-group { display: none !important; }

        /* Custom Modern Sliders */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%;
            background: #ffffff; border: 3px solid #6366f1; cursor: pointer;
            margin-top: -9px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(0.95); border-color: #4f46e5; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #cbd5e1; border-radius: 9999px; }

        /* Glass Inputs */
        .glass-input {
            background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 1rem; padding: 0.75rem 1rem; width: 100%; outline: none;
            transition: all 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .glass-input:focus { background: rgba(255, 255, 255, 0.9); border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        /* PhD Custom Checkbox */
        .phd-check {
            appearance: none; width: 28px; height: 28px; border: 2px solid #cbd5e1; border-radius: 0.5rem;
            outline: none; cursor: pointer; background: white; position: relative; transition: all 0.2s;
        }
        .phd-check:checked { background: #6366f1; border-color: #6366f1; }
        .phd-check:checked::after { content: '✓'; position: absolute; color: white; font-weight: bold; font-size: 16px; top: 1px; left: 6px; }
        
        /* Dynamic Gradients for Results */
        .grade-1st { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .grade-21 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        .grade-22 { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; }
        .grade-other { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #334155; }

        /* Print Media Query */
        @media print {
            body { background: white; color: black; display: block; margin: 0; padding: 0; }
            .glass-panel { box-shadow: none; border: none; background: transparent; filter: none; padding: 0; margin: 0; }
            #control-container, #tab-nav-container, button, .flex-end, .border-b, .no-print, .signature { display: none !important; }
            .grade-1st, .grade-21, .grade-22, .grade-other { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-8" onclick="initAudio()">

    <div id="screen-setup" class="app-screen active-screen glass-panel w-full max-w-2xl rounded-[2rem] p-8 sm:p-12 relative overflow-hidden">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 tracking-tight mb-2">Academic Forecaster</h1>
            <p class="text-slate-500 font-light">Universal Degree Classification Engine</p>
        </div>

        <div class="flex flex-col gap-6 text-left mb-10">
            <div class="flex flex-col gap-2">
                <label class="font-semibold text-slate-700 ml-2">University <span id="api-status" class="text-xs font-normal text-slate-400">(Connecting to DB...)</span></label>
                <input type="text" id="uni-input" class="glass-input" list="uni-list" placeholder="Search institution (e.g. University of Manchester)" oninput="sfxClick()">
                <datalist id="uni-list"></datalist>
            </div>
            
            <div class="flex flex-col gap-2">
                <label class="font-semibold text-slate-700 ml-2">Course Name</label>
                <input type="text" id="course-input" class="glass-input" list="course-list" placeholder="Select or type your course..." oninput="sfxClick()">
                <datalist id="course-list">
                    <option value="Ethical Hacking and Cyber Security"></option>
                    <option value="Computer Science"></option>
                    <option value="Business Management"></option>
                    <option value="Mechanical Engineering"></option>
                    <option value="Psychology"></option>
                    <option value="Law"></option>
                    <option value="Medicine"></option>
                    <option value="Architecture"></option>
                    <option value="Graphic Design"></option>
                    <option value="Accounting and Finance"></option>
                </datalist>
            </div>

            <div class="flex flex-col gap-2">
                <label class="font-semibold text-slate-700 ml-2">Degree Level</label>
                <select id="degree-select" class="glass-input cursor-pointer text-slate-700" onchange="sfxClick()">
                    <option value="bsc" selected>BSc / BA (Undergraduate)</option>
                    <option value="msc">MSc / MA (Master's)</option>
                    <option value="phd">PhD (Doctorate)</option>
                </select>
            </div>
        </div>

        <button onclick="startGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-lg hover:shadow-indigo-500/30 transition-all transform hover:-translate-y-0.5">
            Launch Forecaster
        </button>
    </div>

    <div id="screen-app" class="app-screen glass-panel w-full max-w-5xl rounded-[2rem] p-6 sm:p-10 relative overflow-hidden">
        
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 border-b border-slate-200/50 pb-6 gap-4 no-print">
            <button onclick="goBack()" class="px-5 py-2 rounded-full font-medium text-sm text-slate-500 bg-white/50 hover:bg-white border border-white shadow-sm transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Back
            </button>
            <div class="text-center sm:text-right w-full">
                <p id="display-course" class="text-2xl font-bold text-slate-800 tracking-tight truncate">Course Name</p>
                <p id="display-uni" class="text-slate-500 font-light truncate">University Name</p>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6 px-2 no-print" id="control-container">
            <div class="flex items-center gap-2 text-emerald-600 bg-emerald-50/50 px-3 py-1.5 rounded-lg border border-emerald-100 transition-all" id="save-indicator">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                <span class="text-sm font-medium">Auto-Saved</span>
            </div>
            <button onclick="resetGrades()" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium text-sm text-rose-600 bg-rose-50 hover:bg-rose-100 border border-rose-100 transition-all shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Reset Grades
            </button>
        </div>

        <div class="flex flex-wrap justify-center gap-2 mb-10 bg-white/50 p-1.5 rounded-full border border-white shadow-sm max-w-fit mx-auto no-print" id="tab-nav-container">
            <button onclick="switchTab('year1')" id="btn-year1" class="tab-btn bsc-tab px-6 py-2.5 rounded-full font-medium text-sm text-slate-500 hover:text-slate-800 transition-all">Year 1</button>
            <button onclick="switchTab('year2')" id="btn-year2" class="tab-btn bsc-tab px-6 py-2.5 rounded-full font-medium text-sm text-slate-500 hover:text-slate-800 transition-all">Year 2</button>
            <button onclick="switchTab('year3')" id="btn-year3" class="tab-btn bsc-tab px-6 py-2.5 rounded-full font-medium text-sm text-slate-500 hover:text-slate-800 transition-all">Year 3</button>
            <button onclick="switchTab('results-bsc')" id="btn-results-bsc" class="tab-btn bsc-tab px-6 py-2.5 rounded-full font-medium text-sm text-indigo-600 bg-white shadow-md transition-all active-tab">Forecast</button>
            
            <button onclick="switchTab('msc-modules')" id="btn-msc-modules" class="tab-btn msc-tab hidden-group px-6 py-2.5 rounded-full font-medium text-sm text-slate-500 hover:text-slate-800 transition-all">Modules</button>
            <button onclick="switchTab('results-msc')" id="btn-results-msc" class="tab-btn msc-tab hidden-group px-6 py-2.5 rounded-full font-medium text-sm text-indigo-600 bg-white shadow-md transition-all">Forecast</button>

            <button onclick="switchTab('phd-tracker')" id="btn-phd-tracker" class="tab-btn phd-tab hidden-group px-6 py-2.5 rounded-full font-medium text-sm text-slate-500 hover:text-slate-800 transition-all">Milestones</button>
            <button onclick="switchTab('results-phd')" id="btn-results-phd" class="tab-btn phd-tab hidden-group px-6 py-2.5 rounded-full font-medium text-sm text-indigo-600 bg-white shadow-md transition-all">Status</button>
        </div>

        <div id="year1" class="tab-content bsc-content">
            <div class="flex justify-end gap-2 mb-4 no-print">
                <button onclick="addModule('bsc', 'y1')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-emerald-50 text-emerald-600 hover:bg-emerald-100 transition-all">+ Add</button>
                <button onclick="removeModule('bsc', 'y1')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-rose-50 text-rose-600 hover:bg-rose-100 transition-all">- Remove</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8" id="y1-sliders"></div>
        </div>
        <div id="year2" class="tab-content bsc-content">
            <div class="flex justify-end gap-2 mb-4 no-print">
                <button onclick="addModule('bsc', 'y2')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-emerald-50 text-emerald-600 hover:bg-emerald-100 transition-all">+ Add</button>
                <button onclick="removeModule('bsc', 'y2')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-rose-50 text-rose-600 hover:bg-rose-100 transition-all">- Remove</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8" id="y2-sliders"></div>
        </div>
        <div id="year3" class="tab-content bsc-content">
            <div class="flex justify-end gap-2 mb-4 no-print">
                <button onclick="addModule('bsc', 'y3')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-emerald-50 text-emerald-600 hover:bg-emerald-100 transition-all">+ Add</button>
                <button onclick="removeModule('bsc', 'y3')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-rose-50 text-rose-600 hover:bg-rose-100 transition-all">- Remove</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8" id="y3-sliders"></div>
        </div>
        
        <div id="results-bsc" class="tab-content bsc-content active text-center">
            <div id="result-card-bsc" class="grade-1st p-10 rounded-[2rem] shadow-xl mb-8 transform transition-all duration-500 hover:-translate-y-1">
                <p id="classification-bsc" class="text-2xl sm:text-3xl font-bold mb-3 tracking-wide">First-Class Honours 🥇</p>
                <p id="final-score-bsc" class="text-7xl font-extrabold mb-6 tracking-tighter">76.67%</p>
                <div class="inline-flex items-center gap-2 bg-black/10 backdrop-blur-md px-4 py-1.5 rounded-full text-sm font-medium cursor-help" title="Method 1 relies solely on your final year average. Method 2 calculates 30% from Year 2 and 70% from Year 3. Your university automatically awards the higher of the two.">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="method-used-bsc">Method 1 (100% Year 3)</span>
                    <span class="opacity-70 ml-1">(?)</span>
                </div>
            </div>
            <div class="bg-white/60 p-5 rounded-2xl border border-slate-100 mb-6 flex justify-between items-center shadow-sm">
                <p id="target-metric-text-bsc" class="text-slate-600 font-medium"></p>
                <button onclick="sfxClick(); window.print();" class="px-4 py-2 bg-indigo-50 text-indigo-600 font-medium rounded-lg hover:bg-indigo-100 transition-all no-print text-sm shadow-sm">Print PDF</button>
            </div>
        </div>

        <div id="msc-modules" class="tab-content msc-content hidden-group">
            <div class="flex justify-end gap-2 mb-4 no-print">
                <button onclick="addModule('msc', 'none')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-emerald-50 text-emerald-600 hover:bg-emerald-100 transition-all">+ Add</button>
                <button onclick="removeModule('msc', 'none')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-rose-50 text-rose-600 hover:bg-rose-100 transition-all">- Remove</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8" id="msc-sliders"></div>
        </div>
        
        <div id="results-msc" class="tab-content msc-content hidden-group text-center">
            <div id="result-card-msc" class="grade-1st p-10 rounded-[2rem] shadow-xl mb-8 transform transition-all duration-500 hover:-translate-y-1">
                <p id="classification-msc" class="text-2xl sm:text-3xl font-bold mb-3 tracking-wide">Distinction 🥇</p>
                <p id="final-score-msc" class="text-7xl font-extrabold mb-6 tracking-tighter">75.00%</p>
                <div class="inline-flex items-center gap-2 bg-black/10 backdrop-blur-md px-4 py-1.5 rounded-full text-sm font-medium">
                    <span>Master's Overall Average</span>
                </div>
            </div>
            <div class="bg-white/60 p-5 rounded-2xl border border-slate-100 mb-6 flex justify-between items-center shadow-sm">
                <p id="target-metric-text-msc" class="text-slate-600 font-medium"></p>
                <button onclick="sfxClick(); window.print();" class="px-4 py-2 bg-indigo-50 text-indigo-600 font-medium rounded-lg hover:bg-indigo-100 transition-all no-print text-sm shadow-sm">Print PDF</button>
            </div>
        </div>

        <div id="phd-tracker" class="tab-content phd-content hidden-group">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8" id="phd-checkboxes"></div>
        </div>
        
        <div id="results-phd" class="tab-content phd-content hidden-group text-center">
            <div id="result-card-phd" class="grade-other p-10 rounded-[2rem] shadow-xl mb-8 transform transition-all duration-500 hover:-translate-y-1">
                <p id="classification-phd" class="text-2xl sm:text-3xl font-bold mb-3 tracking-wide">In Progress</p>
                <div class="w-full bg-slate-200/50 rounded-full h-4 mt-8 mb-2 overflow-hidden shadow-inner">
                    <div id="phd-progress-bar" class="bg-indigo-500 h-4 rounded-full transition-all duration-500" style="width: 25%"></div>
                </div>
                <p class="mt-4 font-bold text-3xl"><span id="phd-percent-text">25</span>%</p>
            </div>
            <div class="bg-white/60 p-5 rounded-2xl border border-slate-100 mb-6 flex justify-between items-center shadow-sm">
                <p id="target-metric-text-phd" class="text-slate-600 font-medium"></p>
                <button onclick="sfxClick(); window.print();" class="px-4 py-2 bg-indigo-50 text-indigo-600 font-medium rounded-lg hover:bg-indigo-100 transition-all no-print text-sm shadow-sm">Print PDF</button>
            </div>
        </div>
    </div>

    <div class="mt-8 text-center text-slate-400 font-medium tracking-widest text-sm z-10 relative signature">
        v0.7 | Made by shad
    </div>

    <script>
        // --- 1. AUDIO SYNTHESIZER ---
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playTone(freq, type, duration, vol = 0.05) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        
        const sfxClick = () => playTone(600, 'square', 0.05, 0.03);
        const sfxBlip = () => playTone(900, 'sine', 0.03, 0.02);
        const sfxAdd = () => { playTone(500, 'square', 0.1); setTimeout(() => playTone(1000, 'square', 0.1), 100); };
        const sfxRemove = () => { playTone(400, 'square', 0.1); setTimeout(() => playTone(200, 'square', 0.1), 100); };
        const sfxReset = () => { playTone(300, 'sawtooth', 0.1); setTimeout(() => playTone(150, 'sawtooth', 0.2), 100); };
        const sfxPowerUp = () => { [300, 400, 500, 600, 700].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.1), i * 50)); };
        const sfxWin = () => { [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => setTimeout(() => playTone(freq, 'sine', 0.2), i * 150)); };

        // --- 2. LIVE UNIVERSITY API ---
        async function fetchUniversities() {
            const apiStatus = document.getElementById('api-status');
            const dataList = document.getElementById('uni-list');
            try {
                const response = await fetch('http://universities.hipolabs.com/search?country=United+Kingdom');
                const data = await response.json();
                const uniNames = [...new Set(data.map(u => u.name))].sort();
                uniNames.forEach(name => { dataList.appendChild(new Option(name, name)); });
                apiStatus.innerText = "(Live)";
                apiStatus.classList.replace('text-slate-400', 'text-emerald-500');
            } catch (error) {
                apiStatus.innerText = "(Offline Mode)";
                apiStatus.classList.replace('text-slate-400', 'text-amber-500');
                const fallbackUnis = ["University of Birmingham", "Aston University", "Imperial College London", "University of Manchester"];
                fallbackUnis.forEach(name => { dataList.appendChild(new Option(name, name)); });
            }
        }
        fetchUniversities();

        // --- 3. CORE STATE & AUTO-SAVE ---
        const defaultState = {
            bsc: {
                y1: { grades: [82, 74, 72, 70, 64, 61], names: ["Module 1", "Module 2", "Module 3", "Module 4", "Module 5", "Module 6"] },
                y2: { grades: [81, 68, 67, 61, 60, 58], names: ["Module 1", "Module 2", "Module 3", "Module 4", "Module 5", "Module 6"] },
                y3: { grades: [87, 75, 73, 71, 60, 54], names: ["Module 1", "Module 2", "Module 3", "Module 4", "Module 5", "Dissertation"] }
            },
            msc: { grades: [72, 68, 75, 61, 80], names: ["Core 1", "Core 2", "Elective 1", "Elective 2", "Master's Thesis"] },
            phd: { stages: [{ name: "Literature Review Approved", done: true }, { name: "First Year Transfer", done: false }, { name: "Data Collection", done: false }, { name: "Draft Chapters", done: false }, { name: "Thesis Submitted", done: false }, { name: "Viva Voce Passed", done: false }] }
        };

        let state = JSON.parse(localStorage.getItem('glassAcademicForecasterState')) || JSON.parse(JSON.stringify(defaultState));

        function saveState() {
            localStorage.setItem('glassAcademicForecasterState', JSON.stringify(state));
            const ind = document.getElementById('save-indicator');
            ind.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg><span class="text-sm font-medium">Saving...</span>`;
            ind.classList.replace('text-emerald-600', 'text-slate-400');
            ind.classList.replace('bg-emerald-50/50', 'bg-slate-50/50');
            ind.classList.replace('border-emerald-100', 'border-slate-100');
            
            setTimeout(() => { 
                ind.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span class="text-sm font-medium">Auto-Saved</span>`;
                ind.classList.replace('text-slate-400', 'text-emerald-600');
                ind.classList.replace('bg-slate-50/50', 'bg-emerald-50/50');
                ind.classList.replace('border-slate-100', 'border-emerald-100');
            }, 600);
        }

        // --- 4. NAVIGATION ---
        function startGame() {
            sfxPowerUp();
            const uniInput = document.getElementById('uni-input').value || "Unknown University";
            const courseInput = document.getElementById('course-input').value || "Unknown Course";
            const degreeMode = document.getElementById('degree-select').value;
            
            document.getElementById('display-uni').innerText = uniInput;
            document.getElementById('display-course').innerText = courseInput;
            changeDegreeLevel(degreeMode);

            document.getElementById('screen-setup').classList.remove('active-screen');
            setTimeout(() => document.getElementById('screen-app').classList.add('active-screen'), 100);
        }

        function goBack() {
            sfxRemove();
            document.getElementById('screen-app').classList.remove('active-screen');
            setTimeout(() => document.getElementById('screen-setup').classList.add('active-screen'), 100);
        }

        // --- 5. UI GENERATION ---
        function createSliders(level, yearKey, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            let data = level === 'bsc' ? state.bsc[yearKey] : state.msc;

            data.grades.forEach((val, i) => {
                let name = data.names[i];
                let isFinalProject = name.toLowerCase().includes('dissertation') || name.toLowerCase().includes('thesis') || name.toLowerCase().includes('final');
                let bgClass = isFinalProject ? "bg-indigo-50/80 p-4 rounded-xl border border-indigo-200 shadow-sm" : "bg-white/40 p-4 rounded-xl border border-white shadow-sm hover:shadow-md transition-all";
                let textClass = isFinalProject ? "text-indigo-700 font-bold" : "text-slate-700";
                
                container.innerHTML += `
                    <div class="flex flex-col ${bgClass}">
                        <div class="flex justify-between items-center mb-3 gap-3">
                            <input type="text" value="${name}" class="text-sm font-medium ${textClass} bg-transparent border-b border-transparent hover:border-slate-300 focus:border-indigo-500 focus:outline-none w-full transition-all" onchange="updateName('${level}', '${yearKey}', ${i}, this.value)">
                            <div class="bg-white px-3 py-1 rounded-lg shadow-sm border border-slate-100 flex items-center shrink-0">
                                <span class="text-sm font-bold text-slate-800 w-6 text-center" id="${level}-${yearKey}-val-${i}">${val}</span>
                                <span class="text-xs text-slate-400 ml-1">%</span>
                            </div>
                        </div>
                        <input type="range" min="0" max="100" value="${val}" class="w-full" oninput="updateValue('${level}', '${yearKey}', ${i}, this.value)">
                    </div>
                `;
            });
        }

        function createPhDCheckboxes() {
            const container = document.getElementById('phd-checkboxes');
            container.innerHTML = '';
            state.phd.stages.forEach((stage, i) => {
                container.innerHTML += `
                    <label class="flex items-center gap-4 bg-white/40 p-5 rounded-2xl border border-white shadow-sm hover:shadow-md transition-all cursor-pointer" onmousedown="sfxClick()">
                        <input type="checkbox" class="phd-check shrink-0" ${stage.done ? 'checked' : ''} onchange="updatePhD(${i}, this.checked)">
                        <span class="text-base font-medium text-slate-700">${stage.name}</span>
                    </label>
                `;
            });
        }

        // --- 6. DATA UPDATERS ---
        function updateName(level, yearKey, index, newName) { 
            if (level === 'bsc') state.bsc[yearKey].names[index] = newName; else state.msc.names[index] = newName; 
            createSliders(level, yearKey, `${level === 'bsc' ? yearKey : 'msc'}-sliders`);
            saveState();
        }
        function updateValue(level, yearKey, index, value) {
            if (level === 'bsc') state.bsc[yearKey].grades[index] = parseInt(value); else state.msc.grades[index] = parseInt(value);
            document.getElementById(`${level}-${yearKey}-val-${index}`).innerText = value;
            sfxBlip(); calculateCurrentMode(); saveState();
        }
        function updatePhD(index, isChecked) { state.phd.stages[index].done = isChecked; calculatePhD(); saveState(); }

        function addModule(level, target) {
            sfxAdd();
            if (level === 'msc') { state.msc.grades.push(40); state.msc.names.push(`New Module`); createSliders('msc', 'none', 'msc-sliders'); } 
            else { state.bsc[target].grades.push(40); state.bsc[target].names.push(`New Module`); createSliders('bsc', target, `${target}-sliders`); }
            calculateCurrentMode(); saveState();
        }
        function removeModule(level, target) {
            sfxRemove();
            if (level === 'msc') { if (state.msc.grades.length > 1) { state.msc.grades.pop(); state.msc.names.pop(); createSliders('msc', 'none', 'msc-sliders'); } else alert("Cannot remove all modules."); } 
            else { if (state.bsc[target].grades.length > 1) { state.bsc[target].grades.pop(); state.bsc[target].names.pop(); createSliders('bsc', target, `${target}-sliders`); } else alert("Cannot remove all modules."); }
            calculateCurrentMode(); saveState();
        }

        function resetGrades() {
            sfxReset();
            const mode = document.getElementById('degree-select').value;
            if (mode === 'bsc') { ['y1', 'y2', 'y3'].forEach(year => { state.bsc[year].grades = state.bsc[year].grades.map(() => 40); createSliders('bsc', year, `${year}-sliders`); }); } 
            else if (mode === 'msc') { state.msc.grades = state.msc.grades.map(() => 40); createSliders('msc', 'none', 'msc-sliders'); } 
            else if (mode === 'phd') { state.phd.stages.forEach(s => s.done = false); createPhDCheckboxes(); }
            calculateCurrentMode(); saveState();
        }

        // --- 7. CALCULATORS ---
        function calculateCurrentMode() {
            const mode = document.getElementById('degree-select').value;
            if (mode === 'bsc') calculateBSc();
            else if (mode === 'msc') calculateMSc();
            else calculatePhD();
        }

        function calculateBSc() {
            const getAvg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
            const y2Avg = getAvg(state.bsc.y2.grades);
            const y3Avg = getAvg(state.bsc.y3.grades);
            const final = Math.max(y3Avg, (y2Avg * 0.3) + (y3Avg * 0.7));
            
            document.getElementById('final-score-bsc').innerText = final.toFixed(2) + '%';
            document.getElementById('method-used-bsc').innerText = final === y3Avg ? "Method 1 (100% Year 3)" : "Method 2 (30% Y2 + 70% Year 3)";
            updateCardStyle(final, 'bsc', 70, 60, 50, ["First-Class Honours 🥇", "Upper Second-Class (2:1) 🥈", "Lower Second-Class (2:2) 🥉", final >= 40 ? "Third-Class Honours" : "Fail"]);
        }

        function calculateMSc() {
            const final = state.msc.grades.reduce((a, b) => a + b, 0) / state.msc.grades.length;
            document.getElementById('final-score-msc').innerText = final.toFixed(2) + '%';
            updateCardStyle(final, 'msc', 70, 60, 50, ["Distinction 🥇", "Merit 🥈", "Pass 🥉", "Fail"]);
        }

        function calculatePhD() {
            const completed = state.phd.stages.filter(s => s.done).length;
            const percentage = Math.round((completed / state.phd.stages.length) * 100);
            document.getElementById('phd-progress-bar').style.width = percentage + '%';
            document.getElementById('phd-percent-text').innerText = percentage;
            updateCardStyle(percentage, 'phd', 100, 50, 0, ["Doctorate Awarded 🎓", "Writing Up...", "Research Phase", "Research Phase"]);
        }

        function updateCardStyle(score, mode, t1, t2, t3, texts) {
            const card = document.getElementById(`result-card-${mode}`);
            const clsText = document.getElementById(`classification-${mode}`);
            const tgtText = document.getElementById(`target-metric-text-${mode}`);
            
            card.classList.remove("grade-1st", "grade-21", "grade-22", "grade-other");

            if (score >= t1) { clsText.innerText = texts[0]; card.classList.add("grade-1st"); tgtText.innerHTML = `✅ You are currently forecasting top tier!`; tgtText.className = "text-emerald-600 font-medium"; } 
            else if (score >= t2) { clsText.innerText = texts[1]; card.classList.add("grade-21"); tgtText.innerHTML = `🎯 Push higher to reach the top tier (${t1}%).`; tgtText.className = "text-slate-600 font-medium"; } 
            else if (score >= t3) { clsText.innerText = texts[2]; card.classList.add("grade-22"); tgtText.innerHTML = `🎯 You are passing. Push into the next boundary (${t2}%).`; tgtText.className = "text-slate-600 font-medium"; } 
            else { clsText.innerText = texts[3]; card.classList.add("grade-other"); tgtText.innerHTML = `⚠️ Attention required. Review modules to improve.`; tgtText.className = "text-rose-600 font-medium"; }
        }

        // --- 8. TAB LOGIC ---
        function changeDegreeLevel(forcedMode) {
            const mode = forcedMode || document.getElementById('degree-select').value;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.add('hidden-group'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden-group', 'active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelectorAll(`.${mode}-tab`).forEach(btn => btn.classList.remove('hidden-group'));
            document.querySelectorAll(`.${mode}-content`).forEach(btn => btn.classList.remove('hidden-group'));
            switchTab(`results-${mode}`);
        }

        function switchTab(tabId) {
            sfxClick();
            const mode = document.getElementById('degree-select').value;
            document.querySelectorAll(`.${mode}-tab`).forEach(el => {
                el.classList.remove('bg-white', 'text-indigo-600', 'shadow-md', 'active-tab');
                el.classList.add('text-slate-500');
            });
            document.querySelectorAll(`.${mode}-content`).forEach(el => el.classList.remove('active'));

            if(document.getElementById(`btn-${tabId}`)) {
                let activeBtn = document.getElementById(`btn-${tabId}`);
                activeBtn.classList.remove('text-slate-500');
                activeBtn.classList.add('bg-white', 'text-indigo-600', 'shadow-md', 'active-tab');
            }
            if(document.getElementById(tabId)) document.getElementById(tabId).classList.add('active');

            calculateCurrentMode();
            
            if (tabId.includes('results')) {
                let isWin = false;
                if(mode === 'bsc' && parseFloat(document.getElementById('final-score-bsc').innerText) >= 70) isWin = true;
                if(mode === 'msc' && parseFloat(document.getElementById('final-score-msc').innerText) >= 70) isWin = true;
                if(mode === 'phd' && parseInt(document.getElementById('phd-percent-text').innerText) === 100) isWin = true;
                
                if (isWin) {
                    sfxWin();
                    confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#fbbf24', '#818cf8', '#c084fc'] });
                }
            }
        }

        // Initialize UI on Load
        createSliders('bsc', 'y1', 'y1-sliders'); createSliders('bsc', 'y2', 'y2-sliders'); createSliders('bsc', 'y3', 'y3-sliders');
        createSliders('msc', 'none', 'msc-sliders'); createPhDCheckboxes();
    </script>
</body>
</html>
